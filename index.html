<!DOCTYPE html>
<html>
<head>
  <title>Octavio Ornelas | Cloud Engineer</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px;
           margin: 60px auto; background: #0f1117; color: #e0e0e0; }
    h1 { color: #00c9ff; }
    p { line-height: 1.7; }
    input, textarea {
      width: 100%; padding: 10px; margin: 8px 0;
      background: #1e2130; border: 1px solid #333;
      color: #e0e0e0; border-radius: 4px; box-sizing: border-box;
    }
    button {
      background: #00c9ff; color: #0f1117; padding: 10px 24px;
      border: none; border-radius: 4px; cursor: pointer;
      font-weight: bold; margin-top: 8px;
    }
    button:hover { background: #00a8d6; }
    #status { margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Octavio Ornelas Jr.</h1>
  <p>Computer Engineering student at UTEP. Building cloud infrastructure
     on AWS. Seeking high-impact software/cloud engineering roles.</p>
  <p>Skills: AWS, Python, C, Embedded Systems, Cloud Architecture</p>
  <p>Hosted on AWS S3 with CloudFront CDN - deployed via AWS Console.</p>

  <h2 style="color:#00c9ff;">Contact Me</h2>
  <input type="text" id="name" placeholder="Your Name" />
  <input type="email" id="email" placeholder="Your Email" />
  <textarea id="message" rows="4" placeholder="Your Message"></textarea>
  <button onclick="sendMessage()">Send Message</button>
  <p id="status"></p>

  <script>
    async function sendMessage() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;
      const status = document.getElementById('status');

      status.textContent = 'Sending...';

      try {
        const response = await fetch('https://gk7yrnrgsa.execute-api.us-east-1.amazonaws.com/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message })
        });

        if (response.ok) {
          status.textContent = 'Message sent successfully!';
          status.style.color = '#00c9ff';
        } else {
          status.textContent = 'Something went wrong. Try again.';
          status.style.color = 'red';
        }
      } catch (err) {
        status.textContent = 'Error sending message.';
        status.style.color = 'red';
      }
    }
  </script>
</body>
</html>

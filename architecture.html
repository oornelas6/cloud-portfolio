<!DOCTYPE html>
<html>
<head>
  <title>Cloud Architecture — Octavio Ornelas</title>
  <style>
    body { background: #0f1117; display: flex; 
           justify-content: center; padding: 40px; }
    svg { max-width: 680px; width: 100%; }
  </style>
</head>
<body>
  <svg viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
    <!-- User Browser -->
    <rect x="240" y="20" width="200" height="52" rx="8" fill="#333" stroke="#888" stroke-width="0.5"/>
    <text x="340" y="50" text-anchor="middle" fill="#e0e0e0" font-size="14" font-family="Arial">User Browser</text>
    <line x1="340" y1="72" x2="340" y2="108" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- CloudFront -->
    <rect x="210" y="108" width="260" height="56" rx="8" fill="#1a3a5c" stroke="#378ADD" stroke-width="0.5"/>
    <text x="340" y="132" text-anchor="middle" fill="#85B7EB" font-size="14" font-family="Arial" font-weight="bold">AWS CloudFront</text>
    <text x="340" y="152" text-anchor="middle" fill="#85B7EB" font-size="12" font-family="Arial">CDN — 400+ edge locations</text>
    <line x1="340" y1="164" x2="340" y2="200" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- S3 -->
    <rect x="210" y="200" width="260" height="56" rx="8" fill="#0d3d2b" stroke="#1D9E75" stroke-width="0.5"/>
    <text x="340" y="224" text-anchor="middle" fill="#5DCAA5" font-size="14" font-family="Arial" font-weight="bold">AWS S3</text>
    <text x="340" y="244" text-anchor="middle" fill="#5DCAA5" font-size="12" font-family="Arial">Static site — HTML, CSS, JS</text>
    <line x1="340" y1="256" x2="340" y2="292" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- API Gateway -->
    <rect x="210" y="292" width="260" height="56" rx="8" fill="#2a1a5c" stroke="#7F77DD" stroke-width="0.5"/>
    <text x="340" y="316" text-anchor="middle" fill="#AFA9EC" font-size="14" font-family="Arial" font-weight="bold">AWS API Gateway</text>
    <text x="340" y="336" text-anchor="middle" fill="#AFA9EC" font-size="12" font-family="Arial">POST /contact endpoint</text>
    <line x1="340" y1="348" x2="340" y2="384" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- Lambda -->
    <rect x="210" y="384" width="260" height="56" rx="8" fill="#3d2a00" stroke="#BA7517" stroke-width="0.5"/>
    <text x="340" y="408" text-anchor="middle" fill="#EF9F27" font-size="14" font-family="Arial" font-weight="bold">AWS Lambda</text>
    <text x="340" y="428" text-anchor="middle" fill="#EF9F27" font-size="12" font-family="Arial">Python — contact-form-handler</text>
    <line x1="340" y1="440" x2="340" y2="476" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- SES -->
    <rect x="210" y="476" width="260" height="56" rx="8" fill="#3d1a0d" stroke="#D85A30" stroke-width="0.5"/>
    <text x="340" y="500" text-anchor="middle" fill="#F0997B" font-size="14" font-family="Arial" font-weight="bold">AWS SES</text>
    <text x="340" y="520" text-anchor="middle" fill="#F0997B" font-size="12" font-family="Arial">Email delivery → Gmail</text>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"/>
      </marker>
    </defs>
  </svg>
</body>
</html>
